<script type="module">
  // 1. Find Jekyll's code blocks and give them the class Mermaid expects
  Array.from(document.getElementsByClassName("language-mermaid")).forEach(element => {
    element.classList.add("mermaid");
  });

  // 2. Safely import and run Mermaid
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

  // 3. Explicitly target Jekyll's specific class name for rendering
  mermaid.initialize({
    startOnLoad: true,
    querySelector: '.language-mermaid'
  });
</script>

<!-- GEO/AEO structured metadata for Sovereign Systems Specification -->

<!--
  CHANGES FROM PREVIOUS VERSION:
  1. Person @id standardized to https://www.kenwalger.com/#person (with www)
     everywhere, matching header.php on the personal site. This is the single
     identifier that lets the two sites resolve to ONE entity. Make sure the
     site 301-redirects non-www to www so the live URL agrees with the @id.
  2. The #creativework node is now typed ["CreativeWork", "DefinedTermSet"], so
     every term's inDefinedTermSet points at something that is actually a term set.
  3. Added the Local-First AI term node, so the about -> #local-first-ai edge
     resolves instead of dangling.
  4. Added Write-Side Custody to the CreativeWork's mentions array.
  5. Removed the license property (it had pointed at the repo, which is not a
     license). Add it back pointing at the actual LICENSE URL if you want it.
  6. The per-page block at the bottom now derives its @id from the page filename
     so it matches the canonical term node above, instead of minting a second
     identity at the page URL. This assumes each term page filename matches its
     fragment slug, e.g. cognitive-estate.html <-> #cognitive-estate.
-->
