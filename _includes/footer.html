{% if page.url contains 'ARCHITECTURE' or page.url contains 'architecture' %}
<script type="module">
  // 1. Un-nest Jekyll's <pre><code class="language-mermaid"> elements
  const codeBlocks = document.querySelectorAll('pre code.language-mermaid');

  codeBlocks.forEach(codeEl => {
    const preEl = codeEl.parentElement;
    const mermaidDiv = document.createElement('div');
    mermaidDiv.className = 'mermaid';
    mermaidDiv.textContent = codeEl.textContent;
    preEl.replaceWith(mermaidDiv);
  });

  // 2. Safely load and initialize Mermaid
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: true, theme: 'default' });
</script>
{% endif %}
